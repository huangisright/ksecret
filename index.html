<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閩南建築與僑鄉記憶：系列密室逃脫</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a100c;
      background-image: linear-gradient(rgba(10, 6, 4, 0.7), rgba(10, 6, 4, 0.85)), url('bg_minnan_brick.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #d4c4a8;
      font-family: 'Noto Serif TC', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 900px;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      color: #d4af37;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
      letter-spacing: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(212, 175, 55, 0.3);
      padding-bottom: 20px;
    }

    p.subtitle {
      font-size: 20px;
      line-height: 1.8;
      color: #e8d5a6;
      margin-bottom: 50px;
      letter-spacing: 3px;
    }

    .level-grid {
      display: flex;
      flex-direction: column;
      gap: 30px;
      align-items: center;
    }

    .level-card {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #8b7355;
      border-radius: 8px;
      padding: 30px 40px;
      width: 100%;
      max-width: 600px;
      text-decoration: none;
      color: #d4c4a8;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .level-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(45deg, transparent, rgba(212, 175, 55, 0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .level-card:hover {
      background: rgba(0, 0, 0, 0.8);
      border-color: #d4af37;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      transform: translateY(-5px);
    }

    .level-card:hover::before {
      transform: translateX(100%);
    }

    .level-number {
      font-size: 16px;
      color: #8b7355;
      letter-spacing: 5px;
      margin-bottom: 10px;
    }

    .level-title {
      font-size: 28px;
      color: #e8d5a6;
      margin: 0 0 15px 0;
      letter-spacing: 5px;
    }

    .level-desc {
      font-size: 16px;
      line-height: 1.6;
      color: #bfae91;
      margin: 0;
    }

    .level-card.locked {
      opacity: 0.5;
      pointer-events: none;
      border-style: dashed;
    }
    
    .level-card.locked .level-title {
      color: #8b7355;
    }

    /* Decorative corners */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: #8b7355;
      border-style: solid;
      transition: border-color 0.3s ease;
    }
    .top-left { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
    .top-right { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
    .bottom-left { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
    .bottom-right { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }
    
    .level-card:hover .corner {
      border-color: #d4af37;
    }

    @media (max-width: 768px) {
      .container { padding: 20px; }
      h1 { font-size: 32px; letter-spacing: 4px; margin-bottom: 10px; }
      p.subtitle { font-size: 16px; margin-bottom: 30px; letter-spacing: 2px; }
      .level-title { font-size: 24px; }
      .level-card { padding: 20px 25px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>閩南建築與僑鄉記憶</h1>
    <p class="subtitle">金門落番文化系列</p>

    <div class="level-grid">
      
      <!-- Level 1 -->
      <a href="kinmen_escape_puzzle.html" class="level-card">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="level-number">第一關</div>
        <h2 class="level-title">出洋客的家書</h2>
        <p class="level-desc">一封泛黃的番仔信，隱藏著先輩留給後人的重要遺產。閩南大厝的建築格局中，似乎藏有解開保險箱的玄機...</p>
      </a>

      <!-- Level 2 -->
      <a href="kinmen_escape_puzzle_2.html" class="level-card">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="level-number">第二關</div>
        <h2 class="level-title">落番航海圖</h2>
        <p class="level-desc">殘破的航海日記，記錄著一段充滿血淚的南下歷險。唯有還原這段風波不斷的史實軌跡，才能解開塵封的暗格...</p>
      </a>

      <!-- Level 3 (Locked) -->
      <div class="level-card locked">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="level-number">第三關</div>
        <h2 class="level-title">敬請期待...</h2>
        <p class="level-desc">帶著 1772 的線索，下一段塵封的歷史即將揭曉。</p>
      </div>

    </div>
  </div>

</body>
</html>
