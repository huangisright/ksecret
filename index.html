<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閩南建築與僑鄉記憶：落番密室逃脫</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a100c;
      background-image: linear-gradient(rgba(10, 6, 4, 0.8), rgba(10, 6, 4, 0.95)), url('bg_minnan_brick.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #d4c4a8;
      font-family: 'Noto Serif TC', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 800px;
      padding: 50px;
      text-align: center;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #8b7355;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      position: relative;
    }

    /* Decorative corners */
    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #d4af37;
      border-style: solid;
      opacity: 0.7;
    }
    .top-left { top: 15px; left: 15px; border-width: 2px 0 0 2px; }
    .top-right { top: 15px; right: 15px; border-width: 2px 2px 0 0; }
    .bottom-left { bottom: 15px; left: 15px; border-width: 0 0 2px 2px; }
    .bottom-right { bottom: 15px; right: 15px; border-width: 0 2px 2px 0; }

    h1 {
      font-size: 42px;
      color: #d4af37;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
      letter-spacing: 6px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 24px;
      color: #c83232;
      letter-spacing: 10px;
      margin-bottom: 40px;
      font-weight: normal;
    }

    .story-content {
      font-size: 18px;
      line-height: 2.2;
      color: #e8d5a6;
      text-align: left;
      margin-bottom: 50px;
      padding: 0 20px;
      text-indent: 2em;
    }

    .highlight {
      color: #d4af37;
      font-weight: bold;
    }

    .btn-start {
      display: inline-block;
      padding: 15px 50px;
      font-size: 24px;
      color: #1a100c;
      background: linear-gradient(to bottom, #f4cf57, #d4af37);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      font-family: 'Noto Serif TC', serif;
      font-weight: bold;
      letter-spacing: 5px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      transition: all 0.3s ease;
    }

    .btn-start:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
      background: linear-gradient(to bottom, #ffe066, #e6bc3c);
    }

    .btn-start:active {
      transform: translateY(1px);
    }

    @media (max-width: 768px) {
      .container { padding: 30px 20px; margin: 20px; }
      h1 { font-size: 28px; letter-spacing: 2px; }
      h2 { font-size: 18px; letter-spacing: 4px; margin-bottom: 30px; }
      .story-content { font-size: 16px; padding: 0; }
      .btn-start { font-size: 20px; padding: 12px 40px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>

    <h1>閩南建築與僑鄉記憶</h1>
    <h2>落番密室逃脫</h2>

    <div class="story-content">
      <p>19 世紀中葉，無數金門子弟為求生計，揮別故土，踏上危機四伏的「<span class="highlight">落番</span>」之路。他們在南洋的橡膠園、港口與礦場揮灑血汗，省吃儉用，只為將薪資化作「<span class="highlight">僑匯</span>」與「<span class="highlight">番仔信</span>」寄回故里。這些越洋而來的家書，不僅養活了家族，更在家鄉的土地上，起造了一棟棟華麗的閩南大厝與洋樓。</p>
      
      <p>然而，在一座古老的金門宅第中，隱藏著一段未解的家族秘密。三個塵封的機關，分別記載著先輩的家書、航路的驚險，以及異鄉的歸骨之所。</p>
      
      <p>身為後代的你，必須在 <span class="highlight" style="color: #c83232;">12 分鐘</span>內依序解開這三道歷史謎題。唯有透過數學、邏輯與空間的智慧，才能還原這段跨越百年的血淚記憶...</p>
    </div>

    <a href="levels.html" class="btn-start">開始解謎</a>
  </div>

</body>
</html>
